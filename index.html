<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reach the Stars</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&amp;family=Playfair+Display:wght@700&amp;display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title { font-family: 'Playfair Display', sans-serif; }

        .starfield {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #0f001a 0%, #000 80%);
            overflow: hidden;
        }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 3s infinite alternate; }
        @keyframes twinkle { 0% { opacity: 0.2; } 100% { opacity: 1; } }
        .meteor {
            position: absolute; width: 3px; height: 80px;
            background: linear-gradient(transparent, #c4d0ff);
            animation: meteor 6s linear infinite;
        }
        @keyframes meteor { 0% { transform: translate(-100px, -100px); opacity: 1; } 100% { transform: translate(600px, 600px); opacity: 0; } }

        .crypto-btn {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .crypto-btn:hover { transform: scale(1.08) translateY(-4px); }
    </style>
</head>
<body class="bg-black text-white overflow-x-hidden min-h-screen">
    <div id="starfield" class="starfield"></div>

    <!-- HERO -->
    <div class="relative pt-16 pb-12 text-center px-6 max-w-3xl mx-auto">
        <div class="inline text-xs tracking-[4px] text-indigo-300 mb-6">SPREADING GOD’S WORD</div>
        <h1 class="title text-6xl md:text-7xl leading-none font-bold tracking-tighter mb-4">
            One verse.<br>One gift.
        </h1>
        <p class="text-white/60 text-lg">Help us reach the world.</p>
    </div>

    <!-- CRYPTO DONATION - Most prominent -->
    <div class="max-w-4xl mx-auto px-6 pb-16">
        <div class="bg-white/5 border border-white/10 rounded-3xl p-8 md:p-12">
            <div class="text-center mb-8">
                <div class="text-2xl font-medium">Donate Crypto</div>
                <div class="text-white/50 text-sm mt-1">Select coin → Address appears</div>
            </div>
            
            <div class="grid grid-cols-4 gap-4" id="crypto-grid"></div>

            <!-- Address Reveal -->
            <div id="address-box" class="hidden mt-10 bg-black/70 border border-white/20 rounded-2xl p-8 text-center">
                <div class="flex justify-center gap-4 items-center mb-6">
                    <span id="coin-icon" class="text-6xl"></span>
                    <div>
                        <div id="coin-name" class="text-2xl font-medium"></div>
                        <div id="coin-symbol" class="text-white/40"></div>
                    </div>
                </div>
                <div id="wallet-addr" 
                     class="font-mono text-sm bg-black p-6 rounded-xl break-all text-emerald-300 select-all cursor-pointer"
                     onclick="copyAddress()">
                </div>
                <div onclick="copyAddress()" 
                     class="mt-6 inline-flex items-center gap-2 text-xs uppercase tracking-widest hover:text-white text-white/50 cursor-pointer">
                    <i class="fa-solid fa-copy"></i> COPY ADDRESS
                </div>
            </div>
        </div>
    </div>

    <!-- VIDEO SLIDER -->
    <div class="max-w-5xl mx-auto px-6 pb-16">
        <div class="flex items-center justify-between mb-6 px-2">
            <div class="text-lg font-medium">Bible Verse Videos</div>
            <div class="flex gap-4 text-2xl">
                <button onclick="prevSlide()" class="hover:text-white/70">←</button>
                <button onclick="nextSlide()" class="hover:text-white/70">→</button>
            </div>
        </div>
        
        <div class="relative rounded-3xl overflow-hidden shadow-2xl" style="height: 460px;">
            <div id="slider" class="flex h-full transition-transform duration-700"></div>
        </div>
    </div>

    <!-- SHARE + EMAIL -->
    <div class="max-w-4xl mx-auto px-6 grid md:grid-cols-2 gap-6 pb-20">
        <!-- Share -->
        <div onclick="shareX()" 
             class="bg-white/5 hover:bg-white/10 border border-white/10 rounded-3xl p-8 cursor-pointer transition-all group">
            <div class="flex items-center gap-6">
                <i class="fa-brands fa-x-twitter text-5xl"></i>
                <div>
                    <div class="font-medium text-xl group-hover:text-blue-400">Share on X</div>
                    <div class="text-white/50 text-sm">Help the Word travel further</div>
                </div>
            </div>
        </div>

        <!-- Email -->
        <div class="bg-white/5 border border-white/10 rounded-3xl p-8">
            <form onsubmit="subscribe(event)" class="flex flex-col h-full">
                <input id="email-input" type="email" 
                       placeholder="Get a verse every day"
                       class="bg-transparent border-0 focus:outline-none text-lg placeholder:text-white/40 flex-1">
                <button type="submit"
                        class="mt-6 w-full py-5 bg-white text-black font-medium rounded-2xl hover:bg-white/90">
                    Subscribe
                </button>
            </form>
        </div>
    </div>

    <script>
        // Crypto data
        const cryptos = [
            {name:"Bitcoin", symbol:"BTC", icon:"₿", color:"text-orange-400", addr:"bc1qxy2kdygjrsqtzq2n0yrf2493p83kkfjhx0wlh6"},
            {name:"Ethereum", symbol:"ETH", icon:"⟠", color:"text-indigo-400", addr:"0x71C7656EC7ab88b098defB751B7401B5f6d8976F"},
            {name:"Solana", symbol:"SOL", icon:"◎", color:"text-purple-400", addr:"9WzG8v8z3z9z9z9z9z9z9z9z9z9z9z9z9z9z9z9z"},
            {name:"USDC", symbol:"USDC", icon:"⬡", color:"text-emerald-400", addr:"0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48"}
        ];

        function populateCryptos() {
            const grid = document.getElementById('crypto-grid');
            grid.innerHTML = '';
            cryptos.forEach((c, i) => {
                const div = document.createElement('div');
                div.className = `crypto-btn bg-black border border-white/10 hover:border-white/40 rounded-2xl p-6 text-center cursor-pointer`;
                div.innerHTML = `<div class="text-6xl mb-3 ${c.color}">${c.icon}</div><div class="font-medium">${c.symbol}</div>`;
                div.onclick = () => showAddress(i);
                grid.appendChild(div);
            });
        }

        let currentCrypto = null;
        function showAddress(i) {
            currentCrypto = cryptos[i];
            const box = document.getElementById('address-box');
            box.classList.remove('hidden');
            document.getElementById('coin-icon').innerHTML = currentCrypto.icon;
            document.getElementById('coin-name').textContent = currentCrypto.name;
            document.getElementById('coin-symbol').textContent = currentCrypto.symbol;
            document.getElementById('wallet-addr').textContent = currentCrypto.addr;
        }
        function copyAddress() {
            if (!currentCrypto) return;
            navigator.clipboard.writeText(currentCrypto.addr);
            const addrEl = document.getElementById('wallet-addr');
            const orig = addrEl.style.color;
            addrEl.style.color = '#22c55e';
            setTimeout(() => addrEl.style.color = orig, 1200);
        }

        // Videos (replace thumbs & links with real ones)
        const videos = [
            {title:"John 3:16", verse:"For God so loved the world…", thumb:"https://picsum.photos/id/1015/1200/600", yt:"https://youtube.com"},
            {title:"Psalm 23", verse:"The Lord is my shepherd…", thumb:"https://picsum.photos/id/201/1200/600", yt:"https://youtube.com"},
            {title:"Matthew 6:33", verse:"Seek first the kingdom…", thumb:"https://picsum.photos/id/237/1200/600", yt:"https://youtube.com"}
        ];

        let slideIndex = 0;
        function populateSlider() {
            const container = document.getElementById('slider');
            container.innerHTML = '';
            videos.forEach(v => {
                const slide = document.createElement('div');
                slide.className = 'min-w-full h-full relative';
                slide.innerHTML = `
                    <img src="${v.thumb}" class="absolute inset-0 w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/40 to-transparent"></div>
                    <div class="absolute bottom-0 left-0 right-0 p-10">
                        <div class="text-indigo-300 text-sm tracking-widest mb-2">NEW VERSE</div>
                        <div class="text-4xl font-medium title">${v.title}</div>
                        <div class="mt-2 text-white/80">${v.verse}</div>
                    </div>
                    <a href="${v.yt}" target="_blank" 
                       class="absolute top-8 right-8 bg-white/90 hover:bg-white text-black px-6 py-3 rounded-2xl font-medium flex items-center gap-2">
                        <i class="fa-brands fa-youtube"></i> WATCH
                    </a>
                `;
                container.appendChild(slide);
            });
        }
        function nextSlide() { slideIndex = (slideIndex + 1) % videos.length; updateSlider(); }
        function prevSlide() { slideIndex = (slideIndex - 1 + videos.length) % videos.length; updateSlider(); }
        function updateSlider() {
            document.getElementById('slider').style.transform = `translateX(-${slideIndex * 100}%)`;
        }

        function shareX() {
            const msg = encodeURIComponent("Spreading God’s Word one beautiful Bible verse video at a time. Support with crypto → yourlink.com");
            window.open(`https://x.com/intent/tweet?text=${msg}`, '_blank');
        }

        function subscribe(e) {
            e.preventDefault();
            const email = document.getElementById('email-input').value;
            if (email) {
                alert("Thank you. A new verse will arrive in your inbox tomorrow.");
                document.getElementById('email-input').value = '';
            }
        }

        // Starfield
        function createStars() {
            const sf = document.getElementById('starfield');
            for (let i = 0; i < 600; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                const sz = Math.random() * 2.5 + 0.7;
                s.style.width = sz + 'px';
                s.style.height = sz + 'px';
                s.style.left = Math.random() * 100 + '%';
                s.style.top = Math.random() * 100 + '%';
                s.style.animationDelay = '-' + Math.random() * 4 + 's';
                sf.appendChild(s);
            }
            setInterval(() => {
                const m = document.createElement('div');
                m.className = 'meteor';
                m.style.left = Math.random() * 90 + '%';
                m.style.top = '-80px';
                sf.appendChild(m);
                setTimeout(() => m.remove(), 7000);
            }, 650);
        }

        window.onload = () => {
            populateCryptos();
            populateSlider();
            createStars();
            setInterval(nextSlide, 6500);
        };
    </script>
</body>
</html>
