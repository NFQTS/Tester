<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SASA</title>

<style>
:root{
	--bg:#07070c;
	--card:#141420;
	--text:#f5f5f7;
	--muted:#8a8aa3;
	--border:#23233a;
	--accent:#6c7cff;
}

body{
	margin:0;
	font-family:system-ui;
	background:var(--bg);
	color:var(--text);
	display:flex;
	justify-content:center;
	align-items:center;
	min-height:100vh;
}

.container{
	width:100%;
	max-width:420px;
	padding:20px;
	display:flex;
	flex-direction:column;
	align-items:center;
	gap:12px;
	text-align:center;
}

h1{
	margin:0;
	font-size:20px;
}

.sub{
	font-size:11px;
	color:var(--muted);
	margin-bottom:10px;
}

.card{
	width:100%;
	background:rgba(20,20,32,0.85);
	border:1px solid var(--border);
	border-radius:14px;
	padding:16px;
	cursor:pointer;
	transition:transform .1s ease, border .15s ease;
}

.card:active{
	transform:scale(0.98);
}

.card:hover{
	border-color:var(--accent);
}

.row{
	font-size:16px;
	font-weight:600;
}

.sw{
	font-size:12px;
	color:var(--muted);
	margin-top:4px;
}

/* MODAL */
.modal{
	position:fixed;
	inset:0;
	background:rgba(0,0,0,0.7);
	display:none;
	align-items:center;
	justify-content:center;
}

.box{
	width:90%;
	max-width:320px;
	background:var(--card);
	border:1px solid var(--border);
	border-radius:14px;
	padding:14px;
	display:flex;
	flex-direction:column;
	gap:8px;
}

input{
	padding:10px;
	border-radius:10px;
	border:1px solid var(--border);
	background:#0f0f18;
	color:var(--text);
	font-size:13px;
}

button{
	padding:10px;
	border:none;
	border-radius:10px;
	background:var(--accent);
	color:white;
	font-size:13px;
	cursor:pointer;
}

.small{
	font-size:11px;
	color:var(--muted);
}
</style>
</head>

<body>

<div class="container">

	<h1>SASA</h1>
	<div class="sub">chagua tatizo</div>

	<div class="card" onclick="submitFixed('💸','money')">
		<div class="row">💸 Pesa</div>
		<div class="sw">Money / Income</div>
	</div>

	<div class="card" onclick="submitFixed('⏳','time')">
		<div class="row">⏳ Muda</div>
		<div class="sw">Time / Efficiency</div>
	</div>

	<div class="card" onclick="submitFixed('📚','learning')">
		<div class="row">📚 Elimu</div>
		<div class="sw">Learning / Skills</div>
	</div>

	<div class="card" onclick="openIdea()">
		<div class="row">➕ Wazo</div>
		<div class="sw">Other Ideas</div>
	</div>

	<div class="card" onclick="openMap()">
		<div class="row">🗺 Ramani</div>
		<div class="sw">Needy Areas</div>
	</div>

</div>

<!-- IDEA MODAL -->
<div class="modal" id="ideaModal">
	<div class="box">
		<input id="emoji" placeholder="emoji (mf. 💡)"/>
		<input id="word" placeholder="wazo (neno moja)"/>
		<button onclick="submitIdea()">Submit/Tuma</button>
	</div>
</div>

<!-- MAP MODAL -->
<div class="modal" id="mapModal">
	<div class="box">
		<div class="row">🗺 Ramani</div>
		<div class="small">ramani ya mahitaji inakuja hivi karibuni</div>
		<button onclick="closeMap()">funga</button>
	</div>
</div>

<script>

let regionCache = null;

/* ---------------- IP GEO ---------------- */

async function getRegion(){
	if(regionCache) return regionCache;

	try{
		const res = await fetch("https://ipapi.co/json/");
		const data = await res.json();

		regionCache = {
			country: data.country_name,
			region: data.region,
			city: data.city
		};

		return regionCache;
	}catch(e){
		return {country:"unknown",region:"unknown",city:"unknown"};
	}
}

/* ---------------- SUBMIT FIXED ---------------- */

async function submitFixed(emoji, category){

	const loc = await getRegion();

	const payload = {
		emoji,
		category,
		location: loc,
		timestamp: Date.now()
	};

	console.log("EVENT:", payload);

	alert(`Saved: ${emoji} ${category}`);
}

/* ---------------- IDEA ---------------- */

function openIdea(){
	document.getElementById("ideaModal").style.display="flex";
}

function submitIdea(){
	const emoji = document.getElementById("emoji").value.trim();
	const word = document.getElementById("word").value.trim();

	if(!emoji || !word) return;

	console.log("CUSTOM IDEA:", {
		emoji,
		word
	});

	document.getElementById("emoji").value="";
	document.getElementById("word").value="";
	document.getElementById("ideaModal").style.display="none";
}

/* ---------------- MAP ---------------- */

function openMap(){
	document.getElementById("mapModal").style.display="flex";
}

function closeMap(){
	document.getElementById("mapModal").style.display="none";
}

/* close modal click */
window.onclick = (e)=>{
	if(e.target.classList.contains("modal")){
		e.target.style.display="none";
	}
};

</script>

</body>
</html>
