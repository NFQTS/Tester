<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safe Support</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #ffd6e7, #ffeaf3);
        overflow: hidden;
    }

    .container {
        text-align: center;
        max-width: 400px;
        padding: 20px;
        animation: fadeIn 1.5s ease;
    }

    h1 {
        font-size: 2rem;
        color: #333;
        margin-bottom: 10px;
        animation: float 4s ease-in-out infinite;
    }

    p {
        color: #555;
        margin-bottom: 30px;
        font-size: 1rem;
        line-height: 1.4;
    }

    .btn {
        display: inline-block;
        padding: 14px 28px;
        font-size: 1rem;
        border-radius: 30px;
        background: #ff6fa5;
        color: white;
        text-decoration: none;
        box-shadow: 0 10px 25px rgba(255, 111, 165, 0.3);
        transition: all 0.3s ease;
    }

    .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 30px rgba(255, 111, 165, 0.4);
    }

    .btn:active {
        transform: scale(0.97);
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
    }
</style>
</head>

<body>

<div class="container">
   <a href="https://www.google.com" style="position:absolute; top:15px; right:20px; font-size:0.9rem; color:#777; text-decoration:none;">
Leave site
</a>
    <h1>You are safe here.</h1>
    <p>Get help. Talk to someone.<br>Support for you and your children.</p>
    
    <!-- Replace this link with your Google Form -->
    <a href="https://forms.gle/YOUR-FORM-LINK" class="btn">
        Request Help
    </a>
</div>

</body>
</html>
