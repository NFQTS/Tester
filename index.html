<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✝️💕 Spread The Word 💕✝️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&amp;family=Playfair+Display:wght@700&amp;display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title { font-family: 'Playfair Display', sans-serif; }

        .starfield {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #0f001a 0%, #000 80%);
            overflow: hidden;
        }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 3s infinite alternate; }
        @keyframes twinkle { 0% { opacity: 0.2; } 100% { opacity: 1; } }
        .meteor {
            position: absolute; width: 3px; height: 80px;
            background: linear-gradient(transparent, #c4d0ff);
            animation: meteor 6s linear infinite;
        }
        @keyframes meteor { 0% { transform: translate(-100px, -100px); opacity: 1; } 100% { transform: translate(600px, 600px); opacity: 0; } }

        .crypto-btn {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .crypto-btn:hover { transform: scale(1.08) translateY(-4px); }

        /* RTL support for Arabic */
        .rtl { direction: rtl; text-align: right; }
    </style>
</head>
<body class="bg-black text-white overflow-x-hidden min-h-screen">
    <div id="starfield" class="starfield"></div>

    <!-- HERO -->
    <div class="relative pt-20 pb-12 text-center px-6 max-w-3xl mx-auto">
        <div id="spreading-text" class="inline text-xs tracking-[4px] text-indigo-300 mb-6">SPREADING GOD’S WORD</div>
        <h1 id="hero-title" class="title text-6xl md:text-7xl leading-none font-bold tracking-tighter mb-4">
            Help us reach<br>the world
        </h1>
    </div>

    <!-- CRYPTO DONATION -->
    <div class="max-w-4xl mx-auto px-6 pb-16">
        <div class="bg-white/5 border border-white/10 rounded-3xl p-8 md:p-12">
            <div class="text-center mb-8">
                <div id="donate-title" class="text-2xl font-medium">Donate Crypto</div>
                <div id="donate-desc" class="text-white/50 text-sm mt-1">Select coin • Address appears instantly</div>
            </div>
            
            <div class="grid grid-cols-3 gap-6 max-w-md mx-auto" id="crypto-grid"></div>

            <div id="address-box" class="hidden mt-10 bg-black/70 border border-white/20 rounded-2xl p-8 text-center">
                <div class="flex justify-center gap-4 items-center mb-6">
                    <span id="coin-icon" class="text-6xl"></span>
                    <div>
                        <div id="coin-name" class="text-2xl font-medium"></div>
                        <div id="coin-symbol" class="text-white/40"></div>
                    </div>
                </div>
                <div id="wallet-addr" 
                     class="font-mono text-sm bg-black p-6 rounded-xl break-all text-emerald-300 select-all cursor-pointer"
                     onclick="copyAddress()">
                </div>
                <div onclick="copyAddress()" 
                     class="mt-6 inline-flex items-center gap-2 text-xs uppercase tracking-widest hover:text-white text-white/50 cursor-pointer">
                    <i class="fa-solid fa-copy"></i> COPY ADDRESS
                </div>
            </div>
        </div>
    </div>

    <!-- VIDEO SLIDER -->
    <div class="max-w-5xl mx-auto px-6 pb-16">
        <div class="flex items-center justify-between mb-6 px-2">
            <div id="videos-title" class="text-lg font-medium">Bible Verse Videos</div>
            <div class="flex gap-4 text-2xl">
                <button onclick="prevSlide()" class="hover:text-white/70">←</button>
                <button onclick="nextSlide()" class="hover:text-white/70">→</button>
            </div>
        </div>
        
        <div class="relative rounded-3xl overflow-hidden shadow-2xl" style="height: 460px;">
            <div id="slider" class="flex h-full transition-transform duration-700"></div>
        </div>
    </div>

    <!-- BUY BIBLE + SHARE + EMAIL -->
    <div class="max-w-4xl mx-auto px-6 pb-20">
        <div class="grid md:grid-cols-2 gap-6 mb-8">
            <!-- Buy a Bible -->
            <a href="https://your-bible-store-link.com" target="_blank"
               class="bg-white/5 hover:bg-white/10 border border-white/10 rounded-3xl p-8 flex flex-col justify-center items-center text-center transition-all group">
                <i class="fa-solid fa-book-bible text-5xl mb-4 text-amber-300"></i>
                <div id="buy-title" class="font-medium text-xl group-hover:text-amber-300">Buy a Bible</div>
                <div id="buy-desc" class="text-white/50 text-sm mt-1">Amazon Affiliate Link</div>
            </a>

            <!-- Share -->
            <div onclick="shareX()" 
                 class="bg-white/5 hover:bg-white/10 border border-white/10 rounded-3xl p-8 flex flex-col justify-center items-center text-center cursor-pointer transition-all group">
                <i class="fa-brands fa-x-twitter text-5xl mb-4"></i>
                <div id="share-title" class="font-medium text-xl group-hover:text-blue-400">Share on X</div>
                <div id="share-desc" class="text-white/50 text-sm mt-1">Help the Word spread</div>
            </div>
        </div>

        <!-- Email opt-in -->
        <div class="max-w-md mx-auto bg-white/5 border border-white/10 rounded-3xl p-8 text-center">
            <form onsubmit="subscribe(event)" class="flex flex-col">
                <div id="email-label" class="text-sm text-white/60 mb-3">Daily Verse in your inbox</div>
                <input id="email-input" type="email" 
                       placeholder="your@email.com"
                       class="bg-transparent border-b border-white/30 focus:border-white py-3 text-lg placeholder:text-white/40 focus:outline-none text-center">
                <button id="subscribe-btn" type="submit"
                        class="mt-8 w-full py-5 bg-white text-black font-medium rounded-2xl hover:bg-white/90 transition">
                    Subscribe
                </button>
            </form>
        </div>
    </div>

    <script>

            },
            pt: {

                hero: "Ajude-nos a<br>alcançar o mundo",

                shareMsg: "Ajude-nos a espalhar a Palavra de Deus um versículo bonito de cada vez → yourdomain.com",

            },
            ru: {

                hero: "Помогите нам<br>достичь мира",
                donateTitle: "Пожертвовать криптовалюту",
                donateDesc: "Выберите монету • Адрес появится мгновенно",

                shareTitle: "Поделиться в X",
                shareDesc: "Помогите распространить Слово",
                emailLabel: "Ежедневный стих на почту",
                subscribeBtn: "Подписаться",
                alertMsg: "Спасибо! Завтра вы получите новый библейский стих.",
                shareMsg: "Помогите нам распространять Слово Божье один красивый стих за раз → yourdomain.com",
                watchBtn: "СМОТРЕТЬ"
            },
            id: {
                spreading: "MENYEBARKAN FIRMAN TUHAN",
                hero: "Bantu kami<br>menjangkau dunia",
                donateTitle: "Donasi Kripto",
                donateDesc: "Pilih koin • Alamat muncul seketika",
                videosTitle: "Video Ayat Alkitab",
                verseLabel: "AYAT HARI INI",
                buyTitle: "Beli Alkitab",
                buyDesc: "Link Afiliasi Amazon",
                shareTitle: "Bagikan di X",
                shareDesc: "Bantu Firman menyebar",
                emailLabel: "Ayat harian di inbox Anda",
                subscribeBtn: "Berlangganan",
                alertMsg: "Terima kasih! Besok Anda akan menerima ayat baru.",
                shareMsg: "Bantu kami menyebarkan Firman Tuhan satu ayat indah pada satu waktu → yourdomain.com",
                watchBtn: "TONTON"
            }
        };

        let currentLang = 'en';

        function detectLanguage() {
            let lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase().split('-')[0];
            
            // Prioritize highest population languages
            if (['zh', 'cn'].includes(lang)) currentLang = 'zh';
            else if (['hi'].includes(lang)) currentLang = 'hi';
            else if (['ar'].includes(lang)) currentLang = 'ar';
            else if (['es'].includes(lang)) currentLang = 'es';
            else if (['pt'].includes(lang)) currentLang = 'pt';
            else if (['ru'].includes(lang)) currentLang = 'ru';
            else if (['id'].includes(lang)) currentLang = 'id';
            else currentLang = 'en';
            
            return currentLang;
        }

        function translatePage() {
            const t = translations[currentLang];
            const isArabic = currentLang === 'ar';
            if (isArabic) document.body.classList.add('rtl');
            else document.body.classList.remove('rtl');

            document.getElementById('spreading-text').textContent = t.spreading;
            document.getElementById('hero-title').innerHTML = t.hero;
            document.getElementById('donate-title').textContent = t.donateTitle;
            document.getElementById('donate-desc').textContent = t.donateDesc;
            document.getElementById('videos-title').textContent = t.videosTitle;
            document.getElementById('buy-title').textContent = t.buyTitle;
            document.getElementById('buy-desc').textContent = t.buyDesc;
            document.getElementById('share-title').textContent = t.shareTitle;
            document.getElementById('share-desc').textContent = t.shareDesc;
            document.getElementById('email-label').textContent = t.emailLabel;
            document.getElementById('subscribe-btn').textContent = t.subscribeBtn;
        }

        // === CRYPTO (3 centered) ===
        const cryptos = [
            {name:"Bitcoin", symbol:"BTC", icon:"₿", color:"text-orange-400", addr:"bc1qt7920ytslkkvkx6rcmffclgknvurn8umpuuz3g"},
            {name:"Ethereum", symbol:"ETH", icon:"⟠", color:"text-indigo-400", addr:"0x73Fe0f0Fa44035607b9ddB5Ba560301Ae7C96a54"},
            {name:"Solana", symbol:"SOL", icon:"◎", color:"text-purple-400", addr:"4CYdS9QxVS9tRYtkoi6WKNs1wYL81uSjAjrmjtJ2vT7A"}
        ];

        function populateCryptos() {
            const grid = document.getElementById('crypto-grid');
            grid.innerHTML = '';
            cryptos.forEach((c, i) => {
                const div = document.createElement('div');
                div.className = `crypto-btn bg-black border border-white/10 hover:border-white/40 rounded-2xl p-6 text-center cursor-pointer`;
                div.innerHTML = `<div class="text-6xl mb-3 ${c.color}">${c.icon}</div><div class="font-medium">${c.symbol}</div>`;
                div.onclick = () => showAddress(i);
                grid.appendChild(div);
            });
        }

        let currentCrypto = null;
        function showAddress(i) {
            currentCrypto = cryptos[i];
            const box = document.getElementById('address-box');
            box.classList.remove('hidden');
            document.getElementById('coin-icon').innerHTML = currentCrypto.icon;
            document.getElementById('coin-name').textContent = currentCrypto.name;
            document.getElementById('coin-symbol').textContent = currentCrypto.symbol;
            document.getElementById('wallet-addr').textContent = currentCrypto.addr;
        }
        function copyAddress() {
            if (!currentCrypto) return;
            navigator.clipboard.writeText(currentCrypto.addr);
            const el = document.getElementById('wallet-addr');
            const orig = el.style.color;
            el.style.color = '#22c55e';
            setTimeout(() => el.style.color = orig, 1500);
        }

        // === VIDEO SLIDER ===
        const videos = [
            { ytLink: "https://www.youtube.com/watch?v=dQw4w9wgxcq", title: "John 3:16", verse: "For God so loved the world…" },
            { ytLink: "https://youtube.com/watch?v=EXAMPLE2", title: "Psalm 23", verse: "The Lord is my shepherd…" },
            { ytLink: "https://youtube.com/watch?v=EXAMPLE3", title: "Matthew 6:33", verse: "Seek first the kingdom…" }
        ];

        let slideIndex = 0;

        function getYouTubeId(url) {
            const regExp = /^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function populateSlider() {
            const t = translations[currentLang];
            const container = document.getElementById('slider');
            container.innerHTML = '';
            videos.forEach(v => {
                const id = getYouTubeId(v.ytLink);
                const thumb = id ? `https://img.youtube.com/vi/${id}/maxresdefault.jpg` : 'https://picsum.photos/id/1015/1200/600';
                
                const slide = document.createElement('div');
                slide.className = 'min-w-full h-full relative';
                slide.innerHTML = `
                    <img src="${thumb}" class="absolute inset-0 w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/30 to-transparent"></div>
                    <div class="absolute bottom-0 left-0 right-0 p-10">
                        <div class="text-indigo-300 text-sm tracking-widest mb-2">${t.verseLabel}</div>
                        <div class="text-4xl font-medium title">${v.title}</div>
                        <div class="mt-2 text-white/80">${v.verse}</div>
                    </div>
                    <a href="${v.ytLink}" target="_blank" 
                       class="absolute top-8 right-8 bg-white/90 hover:bg-white text-black px-7 py-3.5 rounded-2xl font-medium flex items-center gap-2 shadow-lg">
                        <i class="fa-brands fa-youtube"></i> ${t.watchBtn}
                    </a>
                `;
                container.appendChild(slide);
            });
        }

        function updateSlider() {
            document.getElementById('slider').style.transform = `translateX(-${slideIndex * 100}%)`;
        }
        function nextSlide() { slideIndex = (slideIndex + 1) % videos.length; updateSlider(); }
        function prevSlide() { slideIndex = (slideIndex - 1 + videos.length) % videos.length; updateSlider(); }

        function shareX() {
            const t = translations[currentLang];
            const msg = encodeURIComponent(t.shareMsg);
            window.open(`https://x.com/intent/tweet?text=${msg}`, '_blank');
        }

        function subscribe(e) {
            e.preventDefault();
            const email = document.getElementById('email-input').value.trim();
            if (email) {
                alert(translations[currentLang].alertMsg);
                document.getElementById('email-input').value = '';
            }
        }

        // Starfield
        function createStars() {
            const sf = document.getElementById('starfield');
            for (let i = 0; i < 650; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                const sz = Math.random() * 2.8 + 0.6;
                s.style.width = sz + 'px';
                s.style.height = sz + 'px';
                s.style.left = Math.random() * 100 + '%';
                s.style.top = Math.random() * 100 + '%';
                s.style.animationDelay = '-' + Math.random() * 4 + 's';
                sf.appendChild(s);
            }
            setInterval(() => {
                const m = document.createElement('div');
                m.className = 'meteor';
                m.style.left = Math.random() * 90 + '%';
                m.style.top = '-80px';
                sf.appendChild(m);
                setTimeout(() => m.remove(), 7000);
            }, 700);
        }

        window.onload = () => {
            detectLanguage();
            translatePage();
            populateCryptos();
            populateSlider();
            createStars();
            setInterval(nextSlide, 7000);
        };
    </script>
</body>
</html>
