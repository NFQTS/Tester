<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Signal • MVP</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
:root {
	--accent: #00ff9d;
}

* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
}

body {
	font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
	background: #050505;
	color: #eee;
	height: 100vh;
	display: flex;
	justify-content: center;
	align-items: center;
	text-align: center;
	overflow: hidden;
}

canvas {
	position: fixed;
	top: 0;
	left: 0;
	z-index: 0;
	opacity: 0.6;
}

.app {
	position: relative;
	z-index: 2;
	width: 100%;
	max-width: 480px;
	height: 100vh;
	background: #0a0a0a;
	border: 1px solid rgba(255,255,255,0.08);
	box-shadow: 0 0 60px rgba(0,255,157,0.15);
	display: flex;
	flex-direction: column;
	align-items: center;
	overflow: hidden;
}

header {
	padding: 20px;
	width: 100%;
	border-bottom: 1px solid rgba(255,255,255,0.08);
	text-align: center;
}

h1 {
	font-size: 28px;
	font-weight: 500;
	color: var(--accent);
}

.screen {
	flex: 1;
	width: 100%;
	overflow-y: auto;
	padding: 24px;
	display: none;
	flex-direction: column;
	align-items: center;
	gap: 24px;
}

.screen.active {
	display: flex;
}

.card {
	width: 100%;
	background: rgba(255,255,255,0.03);
	border: 1px solid rgba(255,255,255,0.08);
	border-radius: 16px;
	padding: 20px;
	backdrop-filter: blur(12px);
	text-align: center;
}

.section-title {
	font-size: 13px;
	opacity: 0.6;
	margin-bottom: 12px;
	text-transform: uppercase;
	letter-spacing: 1px;
}

/* MAP */
#housing-map {
	height: 260px;
	border-radius: 14px;
	overflow: hidden;
	border: 1px solid rgba(255,255,255,0.1);
}

/* OPTIONS */
.option-grid {
	display: grid;
	grid-template-columns: repeat(2, 1fr);
	gap: 12px;
}

.option-btn {
	background: rgba(255,255,255,0.05);
	border: 2px solid transparent;
	border-radius: 14px;
	padding: 14px;
	cursor: pointer;
	transition: 0.2s;
}

.option-btn:hover {
	border-color: var(--accent);
}

.option-btn.active {
	border-color: var(--accent);
	color: var(--accent);
	background: rgba(0,255,157,0.12);
}

.option-btn .emoji {
	font-size: 34px;
	display: block;
	margin-bottom: 6px;
}

/* HOUSING TYPE */
.housing-grid {
	display: grid;
	grid-template-columns: repeat(3, 1fr);
	gap: 10px;
	margin-top: 12px;
}

.housing-btn {
	padding: 12px;
	border-radius: 12px;
	background: rgba(255,255,255,0.05);
	border: 1px solid rgba(255,255,255,0.1);
	cursor: pointer;
}

.housing-btn.active {
	border-color: var(--accent);
	color: var(--accent);
}

/* LOCATION */
.location-box {
	margin-top: 12px;
	font-size: 14px;
}

.btn {
	background: var(--accent);
	color: black;
	font-weight: 700;
	padding: 14px;
	border-radius: 14px;
	border: none;
	width: 100%;
	font-size: 16px;
	cursor: pointer;
}

.btn-secondary {
	background: transparent;
	border: 1px solid rgba(255,255,255,0.2);
	color: white;
	padding: 10px 14px;
	border-radius: 10px;
	margin-top: 10px;
}

/* DASHBOARD */
.dashboard-item {
	margin: 10px 0;
	padding: 10px;
	border-bottom: 1px solid rgba(255,255,255,0.08);
}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="app">

<header>
	<h1>Signal</h1>
</header>

<!-- ONBOARDING -->
<div id="onboarding" class="screen active">

	<div class="card">
		<div class="section-title">Choose Location</div>
		<div id="housing-map"></div>

		<div class="location-box" id="selected-location">
			Click map to select area
		</div>

		<div class="housing-grid">
			<div class="housing-btn" onclick="selectHousingType(this,'Mobile')">Mobile</div>
			<div class="housing-btn" onclick="selectHousingType(this,'Apartment')">Apartment</div>
			<div class="housing-btn" onclick="selectHousingType(this,'Luxury')">Luxury</div>
		</div>
	</div>

	<div class="card">
		<div class="section-title">Transportation</div>
		<div class="option-grid">
			<div class="option-btn" data-transport="Budget" onclick="selectTransport(this)">
				<span class="emoji">🚲</span>
				Budget
			</div>
			<div class="option-btn" data-transport="Standard" onclick="selectTransport(this)">
				<span class="emoji">🚗</span>
				Standard
			</div>
			<div class="option-btn" data-transport="Premium" onclick="selectTransport(this)">
				<span class="emoji">🏎️</span>
				Premium
			</div>
			<div class="option-btn" data-transport="Luxury" onclick="selectTransport(this)">
				<span class="emoji">🛩️</span>
				Luxury
			</div>
		</div>
	</div>

	<div class="card">
		<div class="section-title">Detected Country</div>
		<div id="country-display">Detecting...</div>

		<div id="country-confirm">
			<button class="btn-secondary" onclick="confirmCountry(true)">Yes</button>
			<button class="btn-secondary" onclick="showCountrySelect()">No</button>
		</div>

		<select id="country-select" style="display:none; margin-top:10px; padding:10px; border-radius:10px;">
			<option>United States</option>
			<option>Canada</option>
			<option>Mexico</option>
			<option>United Kingdom</option>
			<option>Germany</option>
			<option>France</option>
			<option>Japan</option>
			<option>Kenya</option>
			<option>India</option>
		</select>
	</div>

	<button class="btn" onclick="goToDashboard()">Continue</button>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="screen">

	<div class="card">
		<div class="section-title">Your Setup</div>

		<div class="dashboard-item">
			<div>Country</div>
			<div id="dash-country"></div>
		</div>

		<div class="dashboard-item">
			<div>Location</div>
			<div id="dash-location"></div>
		</div>

		<div class="dashboard-item">
			<div>Housing Type</div>
			<div id="dash-housing-type"></div>
		</div>

		<div class="dashboard-item">
			<div>Transport</div>
			<div id="dash-transport"></div>
		</div>
	</div>

	<div class="card">
		<div class="section-title">Early Access</div>
		<button class="btn" onclick="paySol()">Pay 1 SOL</button>
	</div>

</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// STARFIELD
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
let stars = [];

function resize() {
	canvas.width = innerWidth;
	canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

for (let i = 0; i < 200; i++) {
	stars.push({
		x: Math.random() * canvas.width,
		y: Math.random() * canvas.height,
		s: Math.random() * 2,
		sp: Math.random() * 0.6 + 0.2
	});
}

function draw() {
	ctx.fillStyle = "rgba(5,5,5,0.4)";
	ctx.fillRect(0,0,canvas.width,canvas.height);

	ctx.fillStyle = "#fff";
	for (let s of stars) {
		ctx.fillRect(s.x, s.y, s.s, s.s);
		s.y += s.sp;
		if (s.y > canvas.height) s.y = 0;
	}
	requestAnimationFrame(draw);
}
draw();

// STATE
let profile = {
	lat: 0,
	lng: 0,
	locationName: "",
	housingType: "",
	transport: "",
	country: ""
};

// MAP
let map, marker;

function initMap() {
	map = L.map('housing-map', { zoomControl:false }).setView([20,0], 2);

	L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

	marker = L.marker([20,0], { draggable:true }).addTo(map);

	function update(pos) {
		profile.lat = pos.lat;
		profile.lng = pos.lng;
		profile.locationName = `${pos.lat.toFixed(2)}, ${pos.lng.toFixed(2)}`;
		document.getElementById("selected-location").innerText = profile.locationName;
	}

	marker.on("dragend", e => update(e.target.getLatLng()));
	map.on("click", e => {
		marker.setLatLng(e.latlng);
		update(e.latlng);
	});
}

// TRANSPORT
function selectTransport(el) {
	document.querySelectorAll(".option-btn").forEach(b=>b.classList.remove("active"));
	el.classList.add("active");
	profile.transport = el.dataset.transport;
}

// HOUSING
function selectHousingType(el, type) {
	document.querySelectorAll(".housing-btn").forEach(b=>b.classList.remove("active"));
	el.classList.add("active");
	profile.housingType = type;
}

// COUNTRY
function detectCountry() {
	fetch("https://ipapi.co/json/")
	.then(r=>r.json())
	.then(d=>{
		profile.country = d.country_name || "Unknown";
		document.getElementById("country-display").innerText = profile.country;
	});
}

function confirmCountry(ok) {
	if (ok) return;
	showCountrySelect();
}

function showCountrySelect() {
	document.getElementById("country-select").style.display = "block";
	document.getElementById("country-select").onchange = (e)=>{
		profile.country = e.target.value;
		document.getElementById("country-display").innerText = profile.country;
	};
}

// NAV
function goToDashboard() {
	document.getElementById("onboarding").classList.remove("active");
	document.getElementById("dashboard").classList.add("active");

	document.getElementById("dash-country").innerText = profile.country;
	document.getElementById("dash-location").innerText = profile.locationName;
	document.getElementById("dash-housing-type").innerText = profile.housingType;
	document.getElementById("dash-transport").innerText = profile.transport;
}

// PAYMENT MOCK
function paySol() {
	alert("1 SOL payment flow placeholder");
}

// INIT
window.onload = () => {
	initMap();
	detectCountry();

	// default transport
	let def = document.querySelector('[data-transport="Standard"]');
	if (def) def.classList.add("active");
	profile.transport = "Standard";
};

</script>

</body>
</html>
