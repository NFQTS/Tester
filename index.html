<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Signal MVP</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
    overflow: hidden;
  }

  canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 2;
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 20px;
  }

  .card {
    background: rgba(20,20,20,0.7);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    backdrop-filter: blur(10px);
  }

  h1, h2 {
    font-weight: 300;
  }

  select, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    background: #111;
    color: white;
  }

  button {
    cursor: pointer;
    background: white;
    color: black;
    font-weight: bold;
  }

  button:hover {
    opacity: 0.85;
  }

  .hidden {
    display: none;
  }

  .row {
    display: flex;
    justify-content: space-between;
    margin: 10px 0;
  }

  .toggle {
    cursor: pointer;
  }

  .points {
    font-size: 28px;
    font-weight: bold;
  }
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="container">

  <!-- ONBOARDING -->
  <div id="onboarding" class="card">
    <h1>Signal Profile</h1>

    <label>Housing Preference</label>
    <select id="housing">
      <option>Minimalist / Mobile</option>
      <option>House / Apartment</option>
      <option>Luxury / Mansion</option>
    </select>

    <label>Transportation</label>
    <select id="transport">
      <option>Budget</option>
      <option>Standard</option>
      <option>Luxury</option>
    </select>

    <button onclick="verifyLocation()">Verify Location (IP)</button>
    <div id="locationStatus" style="margin-top:10px; font-size:12px; opacity:0.7;"></div>

    <button onclick="saveProfile()" style="margin-top:20px;">
      Enter Dashboard
    </button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="hidden">

    <div class="card">
      <h2>Your Signal Profile</h2>
      <div id="profileDisplay"></div>
    </div>

    <div class="card">
      <h2>Sharing Controls</h2>

      <div class="row">
        <span>Data Sharing</span>
        <input type="checkbox" id="shareData" class="toggle" checked />
      </div>

      <div class="row">
        <span>Reward Multiplier</span>
        <input type="checkbox" id="rewardBoost" class="toggle" checked />
      </div>
    </div>

    <div class="card">
      <h2>Daily Points</h2>
      <div class="points" id="points">0</div>
      <button onclick="claimPoints()">Claim Daily Points</button>
    </div>

  </div>

</div>

<script>
// -----------------------------
// STARFIELD ANIMATION
// -----------------------------
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

let stars = [];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

for (let i = 0; i < 200; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    z: Math.random() * canvas.width
  });
}

function animateStars() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let s of stars) {
    s.z -= 2;
    if (s.z <= 0) s.z = canvas.width;

    let k = 128 / s.z;
    let px = s.x * k + canvas.width / 2;
    let py = s.y * k + canvas.height / 2;

    if (px >= 0 && px <= canvas.width && py >= 0 && py <= canvas.height) {
      ctx.fillStyle = "white";
      ctx.fillRect(px, py, 2, 2);
    }
  }

  requestAnimationFrame(animateStars);
}
animateStars();


// -----------------------------
// LOCATION (IP MOCK)
// -----------------------------
let userData = {
  housing: null,
  transport: null,
  location: "unknown",
  points: 0
};

async function verifyLocation() {
  document.getElementById("locationStatus").innerText = "Verifying...";

  try {
    // lightweight IP geolocation API (replace with your backend in production)
    let res = await fetch("https://ipapi.co/json/");
    let data = await res.json();

    userData.location = data.country_name || "unknown";

    document.getElementById("locationStatus").innerText =
      "Location: " + userData.location;

  } catch (e) {
    document.getElementById("locationStatus").innerText =
      "Location failed (fallback: unknown)";
  }
}


// -----------------------------
// SAVE PROFILE
// -----------------------------
function saveProfile() {
  userData.housing = document.getElementById("housing").value;
  userData.transport = document.getElementById("transport").value;

  localStorage.setItem("signalUser", JSON.stringify(userData));

  document.getElementById("onboarding").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");

  renderProfile();
  loadPoints();
}


// -----------------------------
// DASHBOARD RENDER
// -----------------------------
function renderProfile() {
  document.getElementById("profileDisplay").innerHTML = `
    <p>Housing: ${userData.housing}</p>
    <p>Transport: ${userData.transport}</p>
    <p>Location: ${userData.location}</p>
  `;
}


// -----------------------------
// POINT SYSTEM (SIMULATED DAILY)
// -----------------------------
function loadPoints() {
  let stored = JSON.parse(localStorage.getItem("signalUser"));
  if (!stored) return;

  userData = stored;

  let last = localStorage.getItem("lastClaimDate");
  if (!last) {
    document.getElementById("points").innerText = userData.points;
  } else {
    document.getElementById("points").innerText = userData.points;
  }
}

function claimPoints() {
  let today = new Date().toDateString();
  let last = localStorage.getItem("lastClaimDate");

  if (last === today) {
    alert("Already claimed today");
    return;
  }

  let multiplier = document.getElementById("rewardBoost").checked ? 2 : 1;

  let earned = 10 * multiplier;
  userData.points += earned;

  localStorage.setItem("signalUser", JSON.stringify(userData));
  localStorage.setItem("lastClaimDate", today);

  document.getElementById("points").innerText = userData.points;
  renderProfile();
}


// -----------------------------
// AUTO LOAD
// -----------------------------
(function init(){
  let stored = localStorage.getItem("signalUser");
  if (stored) {
    userData = JSON.parse(stored);
    document.getElementById("onboarding").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
    renderProfile();
    loadPoints();
  }
})();
</script>

</body>
</html>
