<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Signal • MVP</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
:root {
	--accent: #00ff9d;
}

* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
}

body {
	font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
	background: #050505;
	color: #eee;
	height: 100vh;
	display: flex;
	align-items: center;
	justify-content: center;
	text-align: center;
}

canvas {
	position: fixed;
	top: 0;
	left: 0;
	z-index: 0;
	opacity: 0.6;
}

.app {
	position: relative;
	z-index: 2;
	width: 100%;
	max-width: 480px;
	height: 100vh;
	background: #0a0a0a;
	border: 1px solid rgba(255,255,255,0.08);
	box-shadow: 0 0 60px rgba(0,255,157,0.15);
	overflow: hidden;
	display: flex;
	flex-direction: column;
	text-align: center;
}

header {
	padding: 20px;
	border-bottom: 1px solid rgba(255,255,255,0.08);
	text-align: center;
}

h1 {
	font-size: 28px;
	color: var(--accent);
}

.screen {
	flex: 1;
	overflow-y: auto;
	padding: 24px;
	display: none;
	flex-direction: column;
	gap: 24px;
	text-align: center;
}

.screen.active {
	display: flex;
}

.card {
	background: rgba(255,255,255,0.03);
	border: 1px solid rgba(255,255,255,0.08);
	border-radius: 16px;
	padding: 20px;
	text-align: center;
}

.section-title {
	font-size: 13px;
	opacity: 0.6;
	margin-bottom: 12px;
	text-transform: uppercase;
}

.option-grid {
	display: grid;
	grid-template-columns: repeat(2, 1fr);
	gap: 12px;
}

.option-btn {
	background: rgba(255,255,255,0.05);
	border-radius: 14px;
	padding: 16px;
	cursor: pointer;
}

.option-btn.active {
	border: 1px solid var(--accent);
	color: var(--accent);
}

.btn {
	background: var(--accent);
	color: black;
	font-weight: 700;
	padding: 16px;
	border-radius: 14px;
	border: none;
	cursor: pointer;
}

.btn-secondary {
	background: transparent;
	border: 1px solid rgba(255,255,255,0.2);
	color: white;
	padding: 10px 14px;
	border-radius: 10px;
}

#housing-map {
	height: 240px;
	border-radius: 14px;
}

.location-box {
	margin-top: 10px;
}

.big {
	font-size: 56px;
	color: var(--accent);
}

.stat-row {
	display: flex;
	justify-content: space-between;
	padding: 10px 0;
}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="app">

<header>
	<h1>Signal</h1>
</header>

<!-- ONBOARDING -->
<div id="onboarding" class="screen active">

	<div class="card">
		<div class="section-title">Select Housing Location</div>
		<div id="housing-map"></div>

		<div style="margin-top:10px;">
			<button class="btn-secondary" onclick="setHousingType('Minimalist/Mobile')">Minimalist</button>
			<button class="btn-secondary" onclick="setHousingType('House/Apartment')">House</button>
			<button class="btn-secondary" onclick="setHousingType('Mansion/Luxury')">Luxury</button>
		</div>

		<div style="margin-top:10px; opacity:0.7" id="selected-location">Loading map...</div>
	</div>

	<div class="card">
		<div class="section-title">Detected Country</div>
		<div id="country-display">Detecting...</div>

		<div class="location-box" id="country-confirm">
			<button class="btn-secondary" onclick="confirmCountry(true)">Yes</button>
			<button class="btn-secondary" onclick="changeCountry()">No</button>
		</div>

		<select id="country-select" style="display:none; margin-top:10px;">
			<option>United States</option>
			<option>Canada</option>
			<option>United Kingdom</option>
			<option>Germany</option>
			<option>Kenya</option>
			<option>Japan</option>
		</select>

		<button class="btn-secondary" style="display:none; margin-top:10px;" id="save-country" onclick="saveCountry()">Save</button>
	</div>

	<button class="btn" onclick="goToDashboard()">Continue</button>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="screen">

	<div class="card">
		<div class="section-title">Your Setup</div>

		<div class="big" id="points">248</div>

		<div class="stat-row">
			<span>Housing Type</span>
			<span id="dash-housing"></span>
		</div>

		<div class="stat-row">
			<span>Country</span>
			<span id="dash-country"></span>
		</div>

	</div>

	<div class="card">
		<div class="section-title">Early Access</div>
		<button class="btn" onclick="buySol()">Pay 1 SOL</button>
	</div>

</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// STARFIELD (minimal)
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

let stars = Array.from({length:200}, () => ({
	x: Math.random()*canvas.width,
	y: Math.random()*canvas.height,
	s: Math.random()*2
}));

function draw(){
	ctx.fillStyle="#050505";
	ctx.fillRect(0,0,canvas.width,canvas.height);
	ctx.fillStyle="#fff";
	for(let s of stars){
		ctx.fillRect(s.x,s.y,s.s,s.s);
		s.y += 0.4;
		if(s.y>canvas.height) s.y=0;
	}
	requestAnimationFrame(draw);
}
draw();

// STATE
let user = {
	housingType: "",
	country: "",
	location: {}
};

// MAP
let map, marker;

function initMap(){
	map = L.map('housing-map',{zoomControl:false}).setView([20,0],2);

	L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

	marker = L.marker([20,0],{draggable:true}).addTo(map);

	marker.on("dragend", updateLocation);
	map.on("click", e=>{
		marker.setLatLng(e.latlng);
		updateLocation();
	});
}

function updateLocation(){
	const pos = marker.getLatLng();
	user.location = pos;
	document.getElementById("selected-location").innerText =
		`Selected: ${pos.lat.toFixed(2)}, ${pos.lng.toFixed(2)}`;
}

function setHousingType(type){
	user.housingType = type;
}

// COUNTRY
async function detectCountry(){
	try{
		let r = await fetch("https://ipapi.co/json/");
		let d = await r.json();
		user.country = d.country_name;
		document.getElementById("country-display").innerText = d.country_name;
	}catch{
		user.country = "United States";
		document.getElementById("country-display").innerText = "United States";
	}
}

function confirmCountry(ok){
	if(ok){
		document.getElementById("country-confirm").style.display="none";
	}else{
		changeCountry();
	}
}

function changeCountry(){
	document.getElementById("country-select").style.display="block";
	document.getElementById("save-country").style.display="block";
}

function saveCountry(){
	user.country = document.getElementById("country-select").value;
	document.getElementById("country-display").innerText = user.country;
	document.getElementById("country-select").style.display="none";
	document.getElementById("save-country").style.display="none";
	document.getElementById("country-confirm").style.display="none";
}

// NAV
function goToDashboard(){
	document.getElementById("onboarding").classList.remove("active");
	document.getElementById("dashboard").classList.add("active");

	document.getElementById("dash-housing").innerText = user.housingType || "Not set";
	document.getElementById("dash-country").innerText = user.country || "Not set";
}

// SOL BUTTON (mock)
function buySol(){
	alert("Redirecting to Solana payment (mock)");
}

// INIT
window.onload = ()=>{
	initMap();
	detectCountry();
};
</script>

</body>
</html>
