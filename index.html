<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THE RAID</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #05060f;
      --accent: #7289ff;
      --accent-glow: rgba(114, 137, 255, 0.45);
      --text: #f0f3ff;
      --muted: #a0a8c0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
      width: 100%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* DEEP SPACE - HYPERSPACE FEEL */
    .space {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: #05060f;
    }

    .stars, .stars2, .stars3, .stars4 {
      position: absolute;
      width: 220%;
      height: 220%;
      background-repeat: repeat;
      animation: hyperspace linear infinite;
      opacity: 0;
    }

    .stars {
      background-image: 
        radial-gradient(1.8px 1.8px at 30px 40px, #ffffff, transparent 70%),
        radial-gradient(1px 1px at 160px 90px, #e0e7ff, transparent),
        radial-gradient(2.2px 2.2px at 310px 180px, #ffffff, transparent);
      background-size: 380px 380px;
      animation-duration: 28s;
      opacity: 0.85;
    }

    .stars2 {
      background-image: 
        radial-gradient(1.2px 1.2px at 80px 150px, #c0d0ff, transparent),
        radial-gradient(2px 2px at 260px 320px, #ffffff, transparent),
        radial-gradient(1px 1px at 420px 80px, #a0b0ff, transparent);
      background-size: 580px 580px;
      animation-duration: 52s;
      opacity: 0.65;
    }

    .stars3 {
      background-image: 
        radial-gradient(3px 3px at 140px 260px, #8899ff, transparent),
        radial-gradient(1.5px 1.5px at 480px 140px, #ffffff, transparent),
        radial-gradient(1px 1px at 620px 380px, #c0d0ff, transparent);
      background-size: 820px 820px;
      animation-duration: 95s;
      opacity: 0.45;
    }

    .stars4 {
      background-image: 
        radial-gradient(0.8px 0.8px at 50px 380px, #ffffff, transparent),
        radial-gradient(2.5px 2.5px at 350px 480px, #e0e7ff, transparent);
      background-size: 460px 460px;
      animation-duration: 38s;
      opacity: 0.35;
    }

    @keyframes hyperspace {
      from { 
        transform: translateY(0) scale(1); 
      }
      to { 
        transform: translateY(-920px) scale(1.45); 
      }
    }

    /* DISTANT NEBULA - VERY SUBTLE */
    .nebula {
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(circle at 35% 25%, rgba(80, 100, 220, 0.08) 0%, transparent 45%),
        radial-gradient(circle at 75% 70%, rgba(120, 60, 180, 0.06) 0%, transparent 50%);
      animation: nebulaDrift 90s linear infinite;
      z-index: 1;
      pointer-events: none;
    }

    @keyframes nebulaDrift {
      0% { transform: translate(0, 0); }
      100% { transform: translate(40px, -30px); }
    }

    /* MAIN CONTENT - CLEAN GLASS */
    .content {
      position: relative;
      z-index: 10;
      width: min(520px, 92%);
      text-align: center;
      padding: 58px 40px;
      background: rgba(12, 14, 32, 0.72);
      backdrop-filter: blur(32px);
      border-radius: 36px;
      border: 1px solid rgba(114, 137, 255, 0.18);
      box-shadow: 
        0 0 90px rgba(20, 25, 60, 0.6),
        0 30px 70px rgba(0, 0, 0, 0.75),
        inset 0 0 30px rgba(255,255,255,0.04);
    }

    .emblem {
      width: 108px;
      height: 108px;
      margin: 0 auto 28px;
      background: linear-gradient(135deg, #5c6fff, #3a4be0);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 46px;
      box-shadow: 0 0 50px rgba(114, 137, 255, 0.5);
      animation: emblemFloat 7s ease-in-out infinite;
    }

    @keyframes emblemFloat {
      0%, 100% { transform: translateY(0) rotate(2deg); }
      50% { transform: translateY(-16px) rotate(-2deg); }
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(3.1rem, 9.5vw, 5.6rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      margin-bottom: 14px;
      background: linear-gradient(90deg, #e0e7ff, #b0bfff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tagline {
      font-size: 1.22rem;
      color: var(--muted);
      margin-bottom: 48px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* CRYPTO BOX */
    .crypto-box {
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(114, 137, 255, 0.22);
      border-radius: 22px;
      padding: 26px 22px;
      margin-bottom: 40px;
      transition: all 0.4s ease;
    }

    .crypto-box:hover {
      border-color: #7289ff;
      box-shadow: 0 0 35px rgba(114, 137, 255, 0.2);
    }

    .label {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .address {
      font-family: monospace;
      font-size: 1.02rem;
      word-break: break-all;
      color: #c5d0ff;
      background: rgba(0,0,0,0.4);
      padding: 16px 20px;
      border-radius: 14px;
      margin-bottom: 16px;
      user-select: all;
    }

    .copy-btn {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 11px 32px;
      border-radius: 9999px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .copy-btn:hover {
      background: var(--accent);
      color: white;
      box-shadow: 0 0 30px var(--accent-glow);
    }

    /* X BUTTON */
    .x-btn {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      background: #000;
      color: white;
      border: none;
      padding: 17px 44px;
      border-radius: 9999px;
      font-size: 1.12rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.6);
    }

    .x-btn:hover {
      transform: scale(1.06) translateY(-3px);
      box-shadow: 0 0 45px rgba(114, 137, 255, 0.4);
    }

    .x-btn svg {
      width: 29px;
      height: 29px;
    }

    .footer {
      margin-top: 58px;
      font-size: 0.86rem;
      color: rgba(160, 168, 192, 0.55);
      letter-spacing: 0.06em;
    }

    /* SUBTLE SCAN LINE FOR DEPTH */
    .scanline {
      position: fixed;
      inset: 0;
      background: linear-gradient(
        to bottom,
        transparent 40%,
        rgba(114, 137, 255, 0.03) 50%,
        transparent 60%
      );
      animation: scan 9s linear infinite;
      pointer-events: none;
      z-index: 2;
    }

    @keyframes scan {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(400%); }
    }
  </style>
</head>
<body>

  <div class="space">
    <div class="stars"></div>
    <div class="stars2"></div>
    <div class="stars3"></div>
    <div class="stars4"></div>
    <div class="nebula"></div>
  </div>

  <div class="scanline"></div>

  <div class="content">
    <div class="emblem">👑</div>
    
    <h1>THE RAID</h1>
    <p class="tagline">We move through the dark</p>

    <!-- ETHEREUM -->
    <div class="crypto-box">
      <div class="label">Fuel the mission • Ethereum</div>
      <div class="address" id="eth-address">0x73Fe0f0Fa44035607b9ddB5Ba560301Ae7C96a54</div>
      <button class="copy-btn" onclick="copyAddress()">COPY WALLET</button>
    </div>

    <!-- X SUPPORT -->
    <button class="x-btn" onclick="shareOnX()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25l-7.955 9.487L3 2.25h4.5L12 9.75l4.5-7.5H21L14.244 12l7.5 10.5H18L12 13.5 5.755 22.5H3L11.244 12 3 2.25z"/></svg>
      RAID ON X
    </button>

    <div class="footer">
      Every satoshi. Every share.<br>
      We build the future together.
    </div>
  </div>

  <script>
    function copyAddress() {
      const addr = document.getElementById('eth-address').textContent;
      navigator.clipboard.writeText(addr).then(() => {
        const btn = document.querySelector('.copy-btn');
        const original = btn.textContent;
        btn.textContent = '✓ COPIED';
        btn.style.background = '#22c55e';
        btn.style.color = '#fff';
        
        setTimeout(() => {
          btn.textContent = original;
          btn.style.background = 'transparent';
          btn.style.color = '#7289ff';
        }, 2000);
      });
    }

    function shareOnX() {
      const text = encodeURIComponent("Join the raid with @UnprincipledInc — moving through the dark and building the future. Support the mission 👑");
      const url = encodeURIComponent("https://x.com/UnprincipledInc");
      window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, '_blank');
    }

    // Keyboard C = copy
    document.addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === 'c') copyAddress();
    });

    // Occasional star intensity flicker
    setInterval(() => {
      const layers = document.querySelectorAll('.stars, .stars2, .stars3');
      layers.forEach(layer => {
        const orig = layer.style.opacity;
        layer.style.transition = 'opacity 0.6s';
        layer.style.opacity = '0.3';
        setTimeout(() => {
          layer.style.opacity = orig;
        }, 900);
      });
    }, 3200);
  </script>
</body>
</html>
