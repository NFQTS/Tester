<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safe Support</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #ffd6e7, #ffeaf3);
        overflow: hidden;
    }

    .container {
        text-align: center;
        max-width: 400px;
        padding: 20px;
        animation: fadeIn 1.5s ease;
    }

    h1 {
        font-size: 2rem;
        color: #333;
        margin-bottom: 10px;
        animation: float 4s ease-in-out infinite;
    }

    p {
        color: #555;
        margin-bottom: 25px;
        font-size: 1rem;
        line-height: 1.4;
    }

    /* Quick Exit Button (larger + near CTA) */
    .exit-btn {
        display: block;
        width: 100%;
        padding: 16px;
        margin-bottom: 12px;

        font-size: 1.1rem;
        border-radius: 30px;

        background: rgba(255, 255, 255, 0.85);
        color: #444;
        text-decoration: none;

        box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        backdrop-filter: blur(6px);

        transition: all 0.25s ease;
    }

    .exit-btn:hover {
        background: rgba(255, 255, 255, 1);
        transform: translateY(-2px);
    }

    .exit-btn:active {
        transform: scale(0.97);
    }

    /* Main CTA */
    .btn {
        display: block;
        width: 100%;
        padding: 16px;

        font-size: 1.1rem;
        border-radius: 30px;

        background: #ff6fa5;
        color: white;
        text-decoration: none;

        box-shadow: 0 10px 25px rgba(255, 111, 165, 0.3);
        transition: all 0.3s ease;
    }

    .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 30px rgba(255, 111, 165, 0.4);
    }

    .btn:active {
        transform: scale(0.97);
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
    }
</style>
</head>

<body>

<div class="container">
    <h1>You are safe here.</h1>
    <p>Get help. Talk to someone.<br>Support for you and your children.</p>

    <!-- Quick Exit (now big + right above CTA) -->
    <a href="https://www.google.com" class="exit-btn">
        Quick Exit
    </a>

    <!-- Main Action -->
    <a href="https://forms.gle/YOUR-FORM-LINK" class="btn">
        Request Help
    </a>
</div>

</body>
</html>
