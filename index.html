<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ri$keee • Share. Earn.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .title-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        .star-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #0a0a1f 0%, #000000 70%);
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 28px;
        }
        
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #334155;
            transition: .3s;
            border-radius: 9999px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 22px; width: 22px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background-color: rgb(234 179 8);
        }
        
        input:checked + .slider:before {
            transform: translateX(24px);
        }

        .data-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .data-card:hover {
            transform: translateY(-4px);
        }
    </style>
</head>
<body class="bg-black text-white min-h-screen overflow-x-hidden">
    <!-- Starfield -->
    <canvas id="starCanvas" class="star-canvas"></canvas>

    <div class="relative z-10 min-h-screen flex flex-col">
        <!-- Minimal Navbar -->
        <nav class="border-b border-white/10 backdrop-blur-lg bg-black/70 fixed w-full z-50">
            <div class="max-w-5xl mx-auto px-6 py-5 flex items-center justify-between">
                <div class="flex items-center gap-x-3">
                    <div class="w-8 h-8 rounded-2xl bg-yellow-500 flex items-center justify-center text-black font-bold text-xl">$</div>
                    <span class="title-font text-3xl tracking-tighter font-semibold">Ri$keee</span>
                </div>
                <button onclick="connectWallet()" 
                        class="px-6 py-2.5 bg-white text-black rounded-2xl font-semibold hover:bg-yellow-400 transition-all">
                    Connect Wallet
                </button>
            </div>
        </nav>

        <main class="flex-1 flex items-center justify-center pt-20 px-6 pb-12">
            <div class="max-w-xl w-full mx-auto text-center">
                <!-- Hero -->
                <div class="mb-12">
                    <h1 class="title-font text-6xl md:text-7xl font-semibold tracking-tighter leading-none mb-6">
                        Share info<br>
                        <span class="bg-gradient-to-r from-yellow-300 to-amber-300 bg-clip-text text-transparent">Get paid</span>
                    </h1>
                    
                    <p class="text-lg md:text-xl text-gray-400 max-w-md mx-auto">
                        Own your data. <br> Earn rewards for sharing
                    </p>
                </div>

                <!-- Reward Meter -->
                <div class="mb-10 bg-white/5 border border-white/10 rounded-3xl p-8 backdrop-blur-xl">
                    <div class="flex justify-between items-end mb-6">
                        <div class="text-left">
                            <div class="text-sm text-gray-400">Your estimated monthly earnings</div>
                            <div id="rewardAmount" class="text-6xl md:text-7xl font-bold text-yellow-400 tracking-tighter">$428</div>
                            <div class="text-emerald-400 font-medium">USDT</div>
                        </div>
                        <div class="text-right">
                            <div class="text-xs uppercase tracking-widest text-gray-500">Selected</div>
                            <div id="toggleCount" class="text-5xl font-mono font-bold text-white/70">0/7</div>
                        </div>
                    </div>
                    
                    <div class="h-2.5 bg-white/10 rounded-full overflow-hidden">
                        <div id="rewardBar" class="h-2.5 bg-gradient-to-r from-yellow-400 to-amber-300 rounded-full w-0 transition-all duration-700"></div>
                    </div>
                </div>

                <!-- Toggles -->
                <div class="bg-white/5 border border-white/10 rounded-3xl p-6 md:p-8 backdrop-blur-xl text-left">
                    <div class="uppercase text-xs tracking-widest text-gray-400 mb-6 flex items-center gap-x-2">
                        <i class="fa-solid fa-shield-halved"></i>
                        WHAT DO YOU WANT TO SHARE?
                    </div>
                    
                    <div id="toggles" class="space-y-4">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- CTA -->
                <div class="mt-10">
                    <button onclick="submitData()" 
                            class="w-full py-7 px-8 bg-white hover:bg-yellow-400 text-black font-semibold text-2xl rounded-3xl transition-all active:scale-95 shadow-xl">
                        Share Selected • Start Earning USDT
                    </button>
                    <p class="text-xs text-gray-500 mt-5">🔒 Your data is encrypted • Only shared with your consent</p>
                </div>
            </div>
        </main>

        <div class="text-center py-8 text-xs text-gray-500">
            Ri$keee Prototype • Data stays yours
        </div>
    </div>

    <script>
        const options = [
            { id: "email", label: "Email Address", icon: "fa-envelope", value: 65 },
            { id: "sms", label: "Phone / SMS", icon: "fa-mobile-screen", value: 55 },
            { id: "selfie", label: "Verified Selfie", icon: "fa-camera", value: 95 },
            { id: "location", label: "Location (GPS)", icon: "fa-location-dot", value: 75 },
            { id: "social", label: "Social Handles", icon: "fa-share-nodes", value: 60 },
            { id: "wallet", label: "Crypto Wallets", icon: "fa-wallet", value: 110 },
            { id: "content", label: "Art / Content Reach", icon: "fa-palette", value: 85 }
        ];

        function createToggles() {
            const container = document.getElementById('toggles');
            container.innerHTML = '';
            
            options.forEach(opt => {
                const div = document.createElement('div');
                div.className = `data-card flex items-center justify-between bg-white/5 hover:bg-white/10 border border-white/10 rounded-2xl px-6 py-5`;
                div.innerHTML = `
                    <div class="flex items-center gap-x-4">
                        <div class="w-9 h-9 flex items-center justify-center text-yellow-400 bg-white/10 rounded-2xl">
                            <i class="fa-solid ${opt.icon} text-2xl"></i>
                        </div>
                        <div>
                            <div class="font-medium text-base">${opt.label}</div>
                            <div class="text-emerald-400 text-sm">+$${opt.value} USDT/mo</div>
                        </div>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="${opt.id}" onchange="updateReward()">
                        <span class="slider"></span>
                    </label>
                `;
                container.appendChild(div);
            });
        }

        function createStarfield() {
            const canvas = document.getElementById('starCanvas');
            const ctx = canvas.getContext('2d');
            
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();
            
            let stars = [];
            for (let i = 0; i < 900; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2.4,
                    speed: Math.random() * 0.9 + 0.4
                });
            }
            
            function animate() {
                ctx.fillStyle = 'rgba(3, 3, 15, 0.18)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#ffffff';
                for (let star of stars) {
                    ctx.globalAlpha = Math.random() * 0.7 + 0.5;
                    ctx.fillRect(star.x, star.y, star.size, star.size);
                    star.y += star.speed;
                    if (star.y > canvas.height) {
                        star.y = 0;
                        star.x = Math.random() * canvas.width;
                    }
                }
                ctx.globalAlpha = 1;
                requestAnimationFrame(animate);
            }
            animate();
        }

        function updateReward() {
            let sum = 0;
            let count = 0;
            
            options.forEach(opt => {
                const cb = document.getElementById(opt.id);
                if (cb && cb.checked) {
                    sum += opt.value;
                    count++;
                }
            });
            
            const total = 180 + sum;
            document.getElementById('rewardAmount').textContent = '$' + total;
            document.getElementById('toggleCount').textContent = count + '/7';
            
            const progress = Math.min(100, (count / 7) * 100 + 30);
            document.getElementById('rewardBar').style.width = progress + '%';
        }

        function connectWallet() {
            alert("✅ Wallet connected (demo)");
        }

        function submitData() {
            const checkedCount = options.filter(opt => document.getElementById(opt.id).checked).length;
            if (checkedCount === 0) {
                alert("Please select at least one option.");
                return;
            }
            const total = parseInt(document.getElementById('rewardAmount').textContent.replace('$',''));
            alert(`✅ Success!\n\nYou are now earning ~$${total} USDT per month based on your shared data.`);
        }

        window.onload = () => {
            createToggles();
            createStarfield();
            updateReward();
            
            // Pre-select a few for demo
            setTimeout(() => {
                ['wallet', 'selfie', 'content'].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.checked = true;
                });
                updateReward();
            }, 600);
        };
    </script>
</body>
</html>
