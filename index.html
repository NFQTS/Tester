<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Signal • MVP</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
:root {
	--accent: #00ff9d;
}

* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
}

body {
	font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
	background: #050505;
	color: #eee;
	height: 100vh;
	display: flex;
	align-items: center;
	justify-content: center;
	text-align: center;
	overflow: hidden;
}

canvas {
	position: fixed;
	top: 0;
	left: 0;
	z-index: 0;
	opacity: 0.6;
}

.app {
	position: relative;
	z-index: 2;
	width: 100%;
	max-width: 480px;
	height: 100vh;
	background: #0a0a0a;
	border: 1px solid rgba(255,255,255,0.08);
	box-shadow: 0 0 60px rgba(0,255,157,0.15);
	display: flex;
	flex-direction: column;
	text-align: center;
}

header {
	padding: 18px;
	border-bottom: 1px solid rgba(255,255,255,0.08);
}

h1 {
	font-size: 26px;
	color: var(--accent);
}

.screen {
	flex: 1;
	overflow-y: auto;
	padding: 22px;
	display: none;
	flex-direction: column;
	gap: 18px;
}

.screen.active {
	display: flex;
}

.card {
	background: rgba(255,255,255,0.03);
	border: 1px solid rgba(255,255,255,0.08);
	border-radius: 16px;
	padding: 18px;
	text-align: center;
}

.section-title {
	font-size: 12px;
	opacity: 0.6;
	text-transform: uppercase;
	margin-bottom: 10px;
	letter-spacing: 1px;
}

#housing-map {
	height: 260px;
	border-radius: 14px;
}

.option-grid {
	display: grid;
	grid-template-columns: repeat(2, 1fr);
	gap: 10px;
	margin-top: 12px;
}

.option-btn {
	background: rgba(255,255,255,0.05);
	border-radius: 14px;
	padding: 14px;
	cursor: pointer;
	transition: 0.2s;
}

.option-btn.active {
	border: 1px solid var(--accent);
	color: var(--accent);
	background: rgba(0,255,157,0.12);
}

.location-bar {
	display: flex;
	align-items: center;
	justify-content: space-between;
	background: rgba(255,255,255,0.05);
	padding: 12px 14px;
	border-radius: 14px;
	margin-top: 10px;
}

.btn {
	background: var(--accent);
	color: black;
	font-weight: 700;
	padding: 14px;
	border-radius: 14px;
	border: none;
	cursor: pointer;
	font-size: 16px;
}

.btn-secondary {
	background: transparent;
	border: 1px solid rgba(255,255,255,0.2);
	color: white;
	padding: 8px 12px;
	border-radius: 10px;
	cursor: pointer;
}

.signal-big {
	font-size: 64px;
	color: var(--accent);
	font-weight: 600;
}

.stat {
	display: flex;
	justify-content: space-between;
	padding: 10px 0;
	border-bottom: 1px solid rgba(255,255,255,0.08);
}

.stat:last-child {
	border: none;
}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="app">

<header>
	<h1>Signal</h1>
</header>

<!-- ONBOARDING -->
<div id="onboarding" class="screen active">

	<div class="card">
		<div class="section-title">Where do you want to live?</div>
		<div id="housing-map"></div>
		<div style="margin-top:10px; opacity:0.7" id="selected-location">Click map to choose area</div>
	</div>

	<div class="card">
		<div class="section-title">Housing Type</div>
		<div class="option-grid">
			<div class="option-btn" onclick="setHousing(this,'Minimalist/Mobile')">🚐<br>Minimalist</div>
			<div class="option-btn" onclick="setHousing(this,'House/Apartment')">🏠<br>House</div>
			<div class="option-btn" onclick="setHousing(this,'Mansion/Luxury')">🏰<br>Luxury</div>
		</div>
	</div>

	<div class="card">
		<div class="section-title">Transportation</div>
		<div class="option-grid">
			<div class="option-btn" onclick="setTransport(this,'Budget')">🚲<br>Budget</div>
			<div class="option-btn" onclick="setTransport(this,'Economical')">🚗<br>Economical</div>
			<div class="option-btn" onclick="setTransport(this,'Luxury')">🏎️<br>Luxury</div>
			<div class="option-btn" onclick="setTransport(this,'Elite')">🛩️<br>Elite</div>
		</div>
	</div>

	<div class="card">
		<div class="section-title">Detected Country</div>
		<div id="country">Detecting...</div>

		<div class="location-bar">
			<button class="btn-secondary" onclick="confirmCountry(true)">Yes</button>
			<button class="btn-secondary" onclick="changeCountry()">No</button>
		</div>

		<select id="country-select" style="display:none; margin-top:10px;">
			<option>United States</option>
			<option>Canada</option>
			<option>United Kingdom</option>
			<option>Germany</option>
			<option>Japan</option>
			<option>Kenya</option>
		</select>

		<button class="btn-secondary" id="save-country" style="display:none; margin-top:10px;" onclick="saveCountry()">Save</button>
	</div>

	<button class="btn" onclick="goDashboard()">Continue</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="screen">

	<div class="card">
		<div class="section-title">Signal Score</div>
		<div class="signal-big" id="points">248</div>
	</div>

	<div class="card">
		<div class="section-title">Your Selections</div>

		<div class="stat">
			<span>Housing</span>
			<span id="dash-housing"></span>
		</div>

		<div class="stat">
			<span>Transport</span>
			<span id="dash-transport"></span>
		</div>

		<div class="stat">
			<span>Country</span>
			<span id="dash-country"></span>
		</div>
	</div>

	<div class="card">
		<div class="section-title">Early Access</div>
		<button class="btn" onclick="paySol()">Pay 1 SOL</button>
	</div>

</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// STARFIELD
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

let stars = Array.from({length:220}, () => ({
	x: Math.random()*canvas.width,
	y: Math.random()*canvas.height,
	s: Math.random()*2
}));

function draw(){
	ctx.fillStyle="#050505";
	ctx.fillRect(0,0,canvas.width,canvas.height);

	ctx.fillStyle="#fff";
	for(let s of stars){
		ctx.fillRect(s.x,s.y,s.s,s.s);
		s.y += 0.3;
		if(s.y>canvas.height) s.y=0;
	}
	requestAnimationFrame(draw);
}
draw();

// STATE
let user = {
	housing:"",
	transport:"",
	country:"",
	location:{}
};

// MAP
let map, marker;

function initMap(){
	map = L.map('housing-map',{zoomControl:false}).setView([20,0],2);

	L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

	marker = L.marker([20,0],{draggable:true}).addTo(map);

	marker.on("dragend", updateLocation);
	map.on("click", e=>{
		marker.setLatLng(e.latlng);
		updateLocation();
	});
}

function updateLocation(){
	const p = marker.getLatLng();
	user.location = p;
	document.getElementById("selected-location").innerText =
		`Selected: ${p.lat.toFixed(2)}, ${p.lng.toFixed(2)}`;
}

// HOUSING / TRANSPORT
function setHousing(el,val){
	user.housing = val;
	document.querySelectorAll(".card .option-btn").forEach(b=>{
		if(b.innerText.includes("Minimalist") || b.innerText.includes("House") || b.innerText.includes("Luxury")){
			b.classList.remove("active");
		}
	});
	el.classList.add("active");
}

function setTransport(el,val){
	user.transport = val;
	document.querySelectorAll(".card .option-btn").forEach(b=>{
		if(b.innerText.includes("Budget") || b.innerText.includes("Economical") || b.innerText.includes("Luxury") || b.innerText.includes("Elite")){
			b.classList.remove("active");
		}
	});
	el.classList.add("active");
}

// COUNTRY
async function detectCountry(){
	try{
		let r = await fetch("https://ipapi.co/json/");
		let d = await r.json();
		user.country = d.country_name;
		document.getElementById("country").innerText = d.country_name;
	}catch{
		user.country = "United States";
		document.getElementById("country").innerText = "United States";
	}
}

function confirmCountry(ok){
	if(ok){
		document.querySelector(".location-bar").style.display="none";
	}else{
		changeCountry();
	}
}

function changeCountry(){
	document.getElementById("country-select").style.display="block";
	document.getElementById("save-country").style.display="block";
}

function saveCountry(){
	user.country = document.getElementById("country-select").value;
	document.getElementById("country").innerText = user.country;
	document.getElementById("country-select").style.display="none";
	document.getElementById("save-country").style.display="none";
}

// NAV
function goDashboard(){
	document.getElementById("onboarding").classList.remove("active");
	document.getElementById("dashboard").classList.add("active");

	document.getElementById("dash-housing").innerText = user.housing || "None";
	document.getElementById("dash-transport").innerText = user.transport || "None";
	document.getElementById("dash-country").innerText = user.country || "None";
}

// PAY
function paySol(){
	alert("Mock: 1 SOL payment flow");
}

// INIT
window.onload = ()=>{
	initMap();
	detectCountry();
};
</script>

</body>
</html>
